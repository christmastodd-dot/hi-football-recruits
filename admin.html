<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Hawaii Football Recruits</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="admin.css">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Teko:wght@400;500;600;700&family=Nunito+Sans:ital,opsz,wght@0,6..12,400;0,6..12,600;0,6..12,700;1,6..12,400&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <div>
        <a href="index.html" class="brand">
          <span class="brand-hi">HI</span>
          <span class="brand-text">Football Recruits</span>
        </a>
        <div class="header-tagline">Admin Panel</div>
      </div>
      <div class="admin-actions">
        <button class="btn btn-outline" id="exportBtn">Export JSON</button>
        <label class="btn btn-outline">
          Import JSON
          <input type="file" accept=".json" id="importFile" hidden>
        </label>
        <button class="btn btn-primary" id="addPlayerBtn">+ Add Player</button>
      </div>
    </div>
  </header>

  <!-- Login Gate -->
  <div class="admin-login" id="loginGate">
    <div class="login-box">
      <h2>Admin Access</h2>
      <p>Enter the admin password to continue.</p>
      <input type="password" id="adminPassword" class="search-input" placeholder="Password" autocomplete="current-password">
      <button class="btn btn-primary" id="loginBtn" style="margin-top:0.75rem;width:100%">Login</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- Admin Content -->
  <div class="admin-content" id="adminContent" style="display:none">

    <!-- Player List -->
    <div class="admin-list" id="playerList"></div>

    <!-- Player Form Modal -->
    <div class="modal-overlay" id="formOverlay">
      <div class="modal" style="max-width:640px">
        <button class="modal-close" id="formClose">&times;</button>
        <div class="modal-body">
          <h2 id="formTitle" style="margin-bottom:1.25rem">Add Player</h2>
          <form id="playerForm">
            <input type="hidden" id="editId">

            <div class="form-row">
              <div class="form-group">
                <label>Full Name *</label>
                <input type="text" id="fName" required>
              </div>
              <div class="form-group">
                <label>Position(s) *</label>
                <div class="checkbox-group" id="fPosition">
                  <label class="cb"><input type="checkbox" value="QB"> QB</label>
                  <label class="cb"><input type="checkbox" value="RB"> RB</label>
                  <label class="cb"><input type="checkbox" value="WR"> WR</label>
                  <label class="cb"><input type="checkbox" value="TE"> TE</label>
                  <label class="cb"><input type="checkbox" value="OL"> OL</label>
                  <label class="cb"><input type="checkbox" value="DL"> DL</label>
                  <label class="cb"><input type="checkbox" value="LB"> LB</label>
                  <label class="cb"><input type="checkbox" value="DB"> DB</label>
                  <label class="cb"><input type="checkbox" value="ATH"> ATH</label>
                  <label class="cb"><input type="checkbox" value="K/P"> K/P</label>
                </div>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>High School *</label>
                <input type="text" id="fSchool" required>
              </div>
              <div class="form-group">
                <label>Class Year *</label>
                <select id="fClassYear" required>
                  <option value="">Select</option>
                  <option>2027</option><option>2028</option>
                  <option>2029</option><option>2030</option>
                </select>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Height (e.g. 6-2)</label>
                <input type="text" id="fHeight">
              </div>
              <div class="form-group">
                <label>Weight (lbs)</label>
                <input type="number" id="fWeight">
              </div>
              <div class="form-group">
                <label>GPA</label>
                <input type="text" id="fGpa">
              </div>
            </div>

            <div class="form-group">
              <label>Photo filename (in /photos folder)</label>
              <input type="text" id="fPhoto" placeholder="e.g. koa-makoa.jpg">
            </div>

            <h3 class="form-section-title">Measurables</h3>
            <div class="form-row">
              <div class="form-group">
                <label>40-Yard</label>
                <input type="text" id="fForty" placeholder="4.55">
              </div>
              <div class="form-group">
                <label>Shuttle</label>
                <input type="text" id="fShuttle" placeholder="4.21">
              </div>
              <div class="form-group">
                <label>Vertical</label>
                <input type="text" id="fVertical" placeholder="34.5">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Broad Jump</label>
                <input type="text" id="fBroadJump" placeholder="9-8">
              </div>
              <div class="form-group">
                <label>Bench</label>
                <input type="text" id="fBench" placeholder="225x12">
              </div>
            </div>

            <h3 class="form-section-title">Awards</h3>
            <div class="form-group">
              <label>Awards (one per line)</label>
              <textarea id="fAwards" rows="3" placeholder="All-State 2025&#10;OIA First Team"></textarea>
            </div>

            <h3 class="form-section-title">Profile Links</h3>
            <div class="form-group">
              <label>Hudl URL</label>
              <input type="url" id="fHudl" placeholder="https://www.hudl.com/...">
            </div>
            <div class="form-group">
              <label>X / Twitter URL</label>
              <input type="url" id="fTwitter" placeholder="https://twitter.com/...">
            </div>
            <div class="form-group">
              <label>Rivals URL</label>
              <input type="url" id="fRivals" placeholder="https://www.rivals.com/...">
            </div>
            <div class="form-group">
              <label>247Sports URL</label>
              <input type="url" id="f247" placeholder="https://247sports.com/...">
            </div>
            <div class="form-group">
              <label>YouTube URL</label>
              <input type="url" id="fYoutube" placeholder="https://youtube.com/...">
            </div>

            <h3 class="form-section-title">Contact Information</h3>
            <div class="form-row">
              <div class="form-group">
                <label>Coach Name</label>
                <input type="text" id="fCoachName" value="Kaeo Drummondo">
              </div>
              <div class="form-group">
                <label>Email</label>
                <input type="email" id="fEmail" value="kadrummo@ksbe.edu">
              </div>
              <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="fPhone" value="808-384-0668">
              </div>
            </div>

            <div class="form-actions">
              <button type="button" class="btn btn-outline" id="formCancel">Cancel</button>
              <button type="submit" class="btn btn-primary">Save Player</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    Hawaii Football Recruits &mdash; Admin Panel
  </footer>

  <script src="admin.js"></script>
</body>
</html>
